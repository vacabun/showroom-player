name: Build Showroom Player Executables

on:
  push:
    tags:
      - 'v*' # 只有当你推送到类似 v1.0.1 的标签时才会触发打包和发布

jobs:
  build:
    permissions: write-all
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: pyinstaller --onefile --windowed --name showroom-player main.py
            release_path: dist/showroom-player_windows_amd64.zip
            asset_name: showroom-player_windows_amd64.zip
          - os: macos-latest
            build_cmd: pyinstaller --windowed --name showroom-player --icon assets/app-icon.icns main.py
            release_path: dist/showroom-player_macos_arm64.app.zip
            asset_name: showroom-player_macos_arm64.app.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          ${{ matrix.build_cmd }}
        shell: bash

      - name: Package macOS App
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/showroom-player.app dist/${{ matrix.asset_name }}
        shell: bash

      - name: Package Windows Executable
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path dist/showroom-player.exe -DestinationPath dist/${{ matrix.asset_name }} -Force"
        shell: bash

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
